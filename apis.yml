description: >-
  Berry Plastics Group was a manufacturer and marketer of plastic packaging products,
  nonwoven specialty materials, and engineered materials serving customers across
  consumer and industrial markets. The company was renamed Berry Global Group in 2017
  to reflect its global operations and diversified product portfolio beyond plastics.
  As Berry Global, the company subsequently merged with Amcor in 2024.
